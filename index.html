
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vehicle Lookup</title>
  <style>
    body {
      background-color: #001f4d;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { margin-bottom: 20px; }
    form {
      background-color: #ffeb3b;
      padding: 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type="text"] {
      padding: 10px;
      font-size: 18px;
      border: none;
      outline: none;
      width: 250px;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover { background-color: #218838; }
    #vehicleDetails {
      margin-top: 30px;
      text-align: center;
      max-width: 600px;
    }
    #printButton {
      margin-top: 20px;
      background-color: #007bff;
      padding: 10px 20px;
      font-size: 18px;
    }
    #printButton:hover { background-color: #0056b3; }
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-top: 30px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success-tick {
      font-size: 48px;
      color: #28a745;
      margin-top: 30px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Vehicle Registration Lookup</h1>

  <form id="vehicleForm">
    <input type="text" id="regNumber" placeholder="Enter Registration" required>
    <button type="submit">Lookup</button>
  </form>

  <div id="vehicleDetails"></div>
  <div id="spinner" style="display:none;" class="spinner"></div>
  <div id="successTick" class="success-tick">✔️</div>
  <button id="printButton" style="display:none;">Print Details</button>

  <script>
    document.getElementById('vehicleForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const regNumber = document.getElementById('regNumber').value.trim().toUpperCase();

      document.getElementById('spinner').style.display = 'block';
      document.getElementById('vehicleDetails').innerHTML = '';
      document.getElementById('successTick').style.display = 'none';
      document.getElementById('printButton').style.display = 'none';

      fetch(`https://mot-checker.p.rapidapi.com/lookup/${regNumber}`, {
        method: 'GET',
        headers: {
          'X-RapidAPI-Key': '66e61ff7c5msh3741231fe49868cp1fb151jsn46822eca6cab',
          'X-RapidAPI-Host': 'mot-checker.p.rapidapi.com'
        }
      })
      .then(response => response.json())
      .then(data => {
        console.log(data);

        document.getElementById('spinner').style.display = 'none';

        if (!data.data || !data.data.vehicle) {
          document.getElementById('vehicleDetails').innerHTML = `<p>No vehicle data found. Please check the registration number.</p>`;
          return;
        }

        const vehicle = data.data.vehicle;

        document.getElementById('vehicleDetails').innerHTML = `
          <h2>Vehicle Details</h2>
          <p><strong>MOT Expiry:</strong> ${vehicle.motExpiryDate || 'N/A'}</p>
          <p><strong>Tax Expiry:</strong> ${vehicle.taxExpiryDate || 'N/A'}</p>
          <p><strong>Make and Model:</strong> ${vehicle.make || 'N/A'} ${vehicle.model || ''}</p>
          <p><strong>Vehicle Colour:</strong> ${vehicle.colour || 'N/A'}</p>
          <p><strong>Year of Manufacture:</strong> ${vehicle.yearOfManufacture || 'N/A'}</p>
          <p><strong>VIN Number:</strong> ${vehicle.vin || 'N/A'}</p>
          <p><strong>Outstanding Recalls:</strong> ${vehicle.outstandingRecalls || 'None Reported'}</p>
        `;

        document.getElementById('successTick').style.display = 'block';
        document.getElementById('printButton').style.display = 'inline-block';
      })
      .catch(error => {
        console.error('Error fetching vehicle data:', error);
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('successTick').style.display = 'none';
        document.getElementById('vehicleDetails').innerHTML = `<p>Error fetching vehicle data. Please try again later.</p>`;
      });
    });

    document.getElementById('printButton').addEventListener('click', function() {
      window.print();
    });
  </script>
</body>
</html>
